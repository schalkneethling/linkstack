## more info on configuring this file: https://ntl.fyi/file-based-build-config

[build]
  command = "npm run build"
  functions = "netlify/functions"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22.22.1"

[dev]
  command = "npm run dev"
  targetPort = 3000
  port = 8888
  publish = "dist"
