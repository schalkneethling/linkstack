<html lang="en">

    <meta charset="UTF-8" />

  <body>
    <header class="app-header" id="app-header">
      <div class="header-container">
        <div class="header-logo">
          <h1 class="logo-text">LinkStack<span class="logo-cursor">_</span></h1>
        </div>
        <nav class="header-nav">
          <button
            type="button"
            class="button solid new-bookmark-btn hidden"
            id="new-bookmark-btn"
            hidden
            popovertarget="form-drawer"
            aria-label="Add new bookmark"
            title="Add new bookmark (Ctrl+N)"
          >
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
              <path d="M8 2a.5.5 0 0 1 .5.5v5h5a.5.5 0 0 1 0 1h-5v5a.5.5 0 0 1-1 0v-5h-5a.5.5 0 0 1 0-1h5v-5A.5.5 0 0 1 8 2Z"/>
            </svg>
            <span>New</span>
          </button>
          <button
            type="button"
            class="button hidden"
            id="admin-review-toggle"
            aria-pressed="false"
            hidden
          >
            Moderation
          </button>
          <linkstack-auth id="header-profile"></linkstack-auth>
        </nav>
      </div>
    </header>

    <!-- Form Drawer Popover (hidden until authenticated) -->
    <form-drawer class="form-drawer hidden" id="form-drawer" popover anchor="new-bookmark-btn" hidden>
      <div class="form-drawer-header">
        <h2 id="form-drawer-title">Add New Bookmark</h2>
        <button
          type="button"
          class="form-drawer-close"
          id="form-drawer-close"
          aria-label="Close"
          popovertarget="form-drawer"
          popovertargetaction="hide"
        >
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M18 6L6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <div class="form-drawer-content">
        <linkstack-form>
        <form
          class="linkstack-form"
          id="bookmark-form"
          name="bookmark"
          action="/"
          method="post"
        >
          <div class="form-field">
            <label class="visually-hidden" for="url">Enter bookmark URL</label>
            <input type="url" name="url" id="url" required />
            <div
              class="field-error"
              id="url-error"
              role="alert"
              aria-live="polite"
            ></div>
          </div>
          <div class="form-field">
            <label class="visually-hidden" for="parent-bookmark"
              >Add to stack (optional)</label
            >
            <select name="parent_id" id="parent-bookmark">
              <option value="">Add to stack (optional)</option>
            </select>
          </div>
          <details class="form-field-collapsible">
            <summary class="form-field-summary">Add a note (optional)</summary>
            <div class="form-field">
              <label class="visually-hidden" for="notes">Personal notes</label>
              <textarea
                name="notes"
                id="notes"
                rows="3"
                placeholder="Add your thoughts, reminders, or context about this bookmark..."
              ></textarea>
            </div>
          </details>
          <div class="form-field public-submit-field">
            <label class="public-submit-toggle" for="request-public">
              <input
                class="public-submit-checkbox"
                type="checkbox"
                name="request_public"
                id="request-public"
              />
              <span class="public-submit-copy">
                <span class="public-submit-label">Submit to the public catalog</span>
                <span class="public-submit-help" id="request-public-help">
                  Public submissions remain private in your library and require moderator approval before they appear publicly.
                </span>
              </span>
            </label>
          </div>
          <button class="button solid" type="submit" id="submit-bookmark">
            <span class="button-text">Add Bookmark</span>
            <span class="button-loading" hidden>Adding...</span>
          </button>
        </form>
      </linkstack-form>
      </div>
    </form-drawer>

    <div class="page-container main-content">
      <section class="hidden" id="admin-panel" hidden>
        <linkstack-public-reviews>
          <div class="toolbar-container">
            <div class="toolbar-search-row">
              <div>
                <h2>Pending Public Reviews</h2>
                <p class="search-results-info" id="public-review-summary">
                  Review bookmarks waiting for public approval.
                </p>
              </div>
            </div>
            <section class="bookmarks-container" id="public-review-container"></section>
          </div>
        </linkstack-public-reviews>
      </section>

      <!-- Search and Controls Toolbar -->
      <div class="toolbar-container">
        <!-- Main Search Bar Row -->
        <div class="toolbar-search-row">
          <div class="search-bar" role="search">
            <label for="search-input" class="visually-hidden"
              >Search bookmarks</label
            >
            <input
              type="search"
              id="search-input"
              class="search-input"
              placeholder="Search bookmarks by title, description, or URL..."
              autocomplete="off"
            />
            <button
              type="button"
              id="clear-search"
              class="clear-search-button"
              aria-label="Clear search"
              hidden
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                aria-hidden="true"
              >
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
              </svg>
            </button>
          </div>

          <!-- View Toggle -->
          <view-toggle class="view-toggle" role="group" aria-label="Change view layout">
            <button
              type="button"
              class="view-toggle-button"
              data-view="grid"
              aria-pressed="true"
              aria-label="Grid view"
              title="Grid view"
            >
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <rect x="3" y="3" width="7" height="7"></rect>
                <rect x="14" y="3" width="7" height="7"></rect>
                <rect x="14" y="14" width="7" height="7"></rect>
                <rect x="3" y="14" width="7" height="7"></rect>
              </svg>
            </button>
            <button
              type="button"
              class="view-toggle-button"
              data-view="list"
              aria-pressed="false"
              aria-label="List view"
              title="List view"
            >
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <line x1="8" y1="6" x2="21" y2="6"></line>
                <line x1="8" y1="12" x2="21" y2="12"></line>
                <line x1="8" y1="18" x2="21" y2="18"></line>
                <line x1="3" y1="6" x2="3.01" y2="6"></line>
                <line x1="3" y1="12" x2="3.01" y2="12"></line>
                <line x1="3" y1="18" x2="3.01" y2="18"></line>
              </svg>
            </button>
          </view-toggle>
        </div>

        <!-- Filter and Sort Controls Row -->
        <div class="toolbar-controls-row">
          <div class="sort-controls-container scope-controls-container">
            <label for="scope-select" class="sort-label" id="scope-label"
              >Showing:</label
            >
            <select id="scope-select" class="sort-select" aria-label="Bookmark scope">
              <option value="public">Public bookmarks</option>
            </select>
          </div>

          <!-- Filter Buttons -->
          <div class="filter-controls-container">
            <span class="filter-label">Show:</span>
            <div class="filter-buttons" role="group" aria-label="Filter bookmarks">
              <button
                type="button"
                class="filter-button"
                data-filter="all"
                aria-pressed="false"
              >
                All
              </button>
              <button
                type="button"
                class="filter-button active"
                data-filter="unread"
                aria-pressed="true"
              >
                Unread
              </button>
              <button
                type="button"
                class="filter-button"
                data-filter="read"
                aria-pressed="false"
              >
                Read
              </button>
            </div>
          </div>

          <!-- Sort Controls -->
          <div class="sort-controls-container">
            <label for="sort-select" class="sort-label">Sort by:</label>
            <select
              id="sort-select"
              class="sort-select"
              aria-label="Sort bookmarks"
            >
              <option value="newest">Newest first</option>
              <option value="oldest">Oldest first</option>
              <option value="alpha-asc">A-Z</option>
              <option value="alpha-desc">Z-A</option>
            </select>
          </div>
        </div>

        <!-- Search Results Info -->
        <div
          class="search-results-info"
          role="status"
          aria-live="polite"
          aria-atomic="true"
        ></div>
      </div>

      <linkstack-bookmarks>
        <section class="bookmarks-container" id="bookmarks-container"></section>

        <template id="no-bookmarks-tmpl">
          <div class="no-bookmarks-wrapper">
            <div class="no-bookmarks">
              <h2>No bookmarks?!</h2>
              <p class="text-medium">Why not add your first?</p>
            </div>
          </div>
        </template>

        <template id="skeleton-loader-tmpl">
          <div
            class="skeleton-loader"
            role="status"
            aria-label="Loading bookmarks"
          >
            <ul class="bookmarks-list skeleton-list">
              <li class="skeleton-item">
                <div class="skeleton-img"></div>
                <div class="skeleton-content">
                  <div class="skeleton-title"></div>
                  <div class="skeleton-description"></div>
                  <div class="skeleton-actions"></div>
                </div>
              </li>
              <li class="skeleton-item">
                <div class="skeleton-img"></div>
                <div class="skeleton-content">
                  <div class="skeleton-title"></div>
                  <div class="skeleton-description"></div>
                  <div class="skeleton-actions"></div>
                </div>
              </li>
              <li class="skeleton-item">
                <div class="skeleton-img"></div>
                <div class="skeleton-content">
                  <div class="skeleton-title"></div>
                  <div class="skeleton-description"></div>
                  <div class="skeleton-actions"></div>
                </div>
              </li>
            </ul>
          </div>
        </template>

        <template id="bookmarks-entry-tmpl">
          <li class="bookmark-entry">
            <div class="bookmark-info">
              <a
                class="bookmark-link"
                target="_blank"
                rel="noopener noreferrer"
                href=""
              >
                <h3 class="bookmark-title"></h3>
              </a>
              <p class="bookmark-description"></p>
              <div class="bookmark-public-status hidden">
                <span class="tag"></span>
              </div>
              <p class="bookmark-public-message hidden"></p>
              <div class="bookmark-tags"></div>
              <div class="bookmark-notes hidden">
                <details>
                  <summary>
                    <svg
                      xmlns="http://www.w3.org/2000/svg"
                      width="16"
                      height="16"
                      viewBox="0 0 24 24"
                      stroke-width="1.5"
                      stroke="currentColor"
                      fill="none"
                      aria-hidden="true"
                    >
                      <path
                        d="M3 19V5C3 3.89543 3.89543 3 5 3H16.1716C16.702 3 17.2107 3.21071 17.5858 3.58579L19.4142 5.41421C19.7893 5.78929 20 6.29799 20 6.82843V19C20 20.1046 19.1046 21 18 21H5C3.89543 21 3 20.1046 3 19Z"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                      />
                      <path
                        d="M7 9L11 9"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                      />
                      <path
                        d="M7 13L17 13"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                      />
                      <path
                        d="M7 17L13 17"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                      />
                    </svg>
                    <span class="notes-label">My Notes</span>
                  </summary>
                  <p class="notes-content"></p>
                </details>
              </div>
              <div class="bookmark-actions">
                <div class="bookmark-actions-primary">
                  <button
                    id="toggle-read-status"
                    type="button"
                    class="button solid"
                    data-is-read="false"
                    aria-label="Mark as read"
                  >
                    <span class="read-icon" aria-hidden="true">✓</span>
                    <span class="read-text">Mark as Read</span>
                  </button>
                  <button
                    id="save-public-copy"
                    type="button"
                    class="button solid hidden"
                  >
                    Save to My Bookmarks
                  </button>
                </div>
                <button
                  type="button"
                  class="context-menu-trigger"
                  aria-label="More actions"
                  aria-haspopup="true"
                >
                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                    <circle cx="12" cy="5" r="2"></circle>
                    <circle cx="12" cy="12" r="2"></circle>
                    <circle cx="12" cy="19" r="2"></circle>
                  </svg>
                </button>
                <div class="context-menu" popover>
                  <button id="edit-bookmark" type="button" class="context-menu-item">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                      <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                      <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                    </svg>
                    Edit Bookmark
                  </button>
                  <button
                    id="request-public-share"
                    type="button"
                    class="context-menu-item"
                  >
                    Request Public Listing
                  </button>
                  <button id="delete-bookmark" type="button" class="context-menu-item destructive">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                      <polyline points="3 6 5 6 21 6"></polyline>
                      <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                      <line x1="10" y1="11" x2="10" y2="17"></line>
                      <line x1="14" y1="11" x2="14" y2="17"></line>
                    </svg>
                    Remove Bookmark
                  </button>
                </div>
              </div>
            </div>
            <button
              class="stack-toggle hidden"
              type="button"
              aria-expanded="false"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                stroke-width="1.5"
                stroke="currentColor"
                fill="none"
              >
                <path
                  d="M6 9L12 15L18 9"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
              <span class="stack-label visually-hidden">Show stack</span>
            </button>
            <ul class="stack-children reset-list hidden"></ul>
          </li>
        </template>

        <template id="bookmark-child-tmpl">
          <li class="bookmark-child">
            <div class="bookmark-child-info">
              <a
                class="bookmark-link"
                target="_blank"
                rel="noopener noreferrer"
                href=""
              >
                <h4 class="bookmark-title"></h4>
              </a>
              <p class="bookmark-description"></p>
              <div class="bookmark-public-status hidden">
                <span class="tag"></span>
              </div>
              <p class="bookmark-public-message hidden"></p>
              <div class="bookmark-tags"></div>
              <div class="bookmark-notes hidden">
                <details>
                  <summary>
                    <svg
                      xmlns="http://www.w3.org/2000/svg"
                      width="16"
                      height="16"
                      viewBox="0 0 24 24"
                      stroke-width="1.5"
                      stroke="currentColor"
                      fill="none"
                      aria-hidden="true"
                    >
                      <path
                        d="M3 19V5C3 3.89543 3.89543 3 5 3H16.1716C16.702 3 17.2107 3.21071 17.5858 3.58579L19.4142 5.41421C19.7893 5.78929 20 6.29799 20 6.82843V19C20 20.1046 19.1046 21 18 21H5C3.89543 21 3 20.1046 3 19Z"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                      />
                      <path
                        d="M7 9L11 9"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                      />
                      <path
                        d="M7 13L17 13"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                      />
                      <path
                        d="M7 17L13 17"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                      />
                    </svg>
                    <span class="notes-label">My Notes</span>
                  </summary>
                  <p class="notes-content"></p>
                </details>
              </div>
              <div class="bookmark-actions">
                <div class="bookmark-actions-primary">
                  <button
                    id="toggle-read-status"
                    type="button"
                    class="button solid"
                    data-is-read="false"
                    aria-label="Mark as read"
                  >
                    <span class="read-icon" aria-hidden="true">✓</span>
                    <span class="read-text">Mark as Read</span>
                  </button>
                  <button
                    id="save-public-copy"
                    type="button"
                    class="button solid hidden"
                  >
                    Save to My Bookmarks
                  </button>
                </div>
                <button
                  type="button"
                  class="context-menu-trigger"
                  aria-label="More actions"
                  aria-haspopup="true"
                >
                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                    <circle cx="12" cy="5" r="2"></circle>
                    <circle cx="12" cy="12" r="2"></circle>
                    <circle cx="12" cy="19" r="2"></circle>
                  </svg>
                </button>
                <div class="context-menu" popover>
                  <button id="edit-bookmark" type="button" class="context-menu-item">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                      <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                      <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                    </svg>
                    Edit
                  </button>
                  <button
                    id="request-public-share"
                    type="button"
                    class="context-menu-item"
                  >
                    Request Public Listing
                  </button>
                  <button id="delete-bookmark" type="button" class="context-menu-item destructive">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                      <polyline points="3 6 5 6 21 6"></polyline>
                      <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                      <line x1="10" y1="11" x2="10" y2="17"></line>
                      <line x1="14" y1="11" x2="14" y2="17"></line>
                    </svg>
                    Remove
                  </button>
                </div>
              </div>
            </div>
          </li>
        </template>
      </linkstack-bookmarks>

      <linkstack-edit-dialog>
        <dialog
          aria-labelledby="dialog-edit-bookmark-title"
          class="linkstack-dialog"
          id="dialog-edit-bookmark"
        >
          <form class="form-close-dialog" method="dialog">
            <button class="button-ghost" type="submit">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="16"
                height="16"
                fill="currentColor"
                viewBox="0 0 16 16"
                role="img"
              >
                <path
                  d="M2.146 2.854a.5.5 0 1 1 .708-.708L8 7.293l5.146-5.147a.5.5 0 0 1 .708.708L8.707 8l5.147 5.146a.5.5 0 0 1-.708.708L8 8.707l-5.146 5.147a.5.5 0 0 1-.708-.708L7.293 8z"
                />
              </svg>
              <span class="visually-hidden">Close dialog</span>
            </button>
          </form>

          <h3 id="dialog-edit-bookmark-title">Edit Bookmark</h3>

          <form
            aria-labelledby="dialog-edit-bookmark-title"
            class="edit-bookmark-form"
            id="edit-bookmark-form"
            name="edit-bookmark"
            method="post"
          >
            <div class="form-field">
              <label for="edit-title">Update the bookmark title</label>
              <input
                type="text"
                name="title"
                id="edit-title"
                required
                autofocus
              />
            </div>
            <div class="form-field">
              <label for="edit-description"
                >Update the bookmark description</label
              >
              <textarea
                name="description"
                id="edit-description"
                rows="3"
              ></textarea>
            </div>
            <div class="form-field">
              <label for="edit-notes">Personal notes (optional)</label>
              <textarea
                name="notes"
                id="edit-notes"
                rows="4"
                placeholder="Add your thoughts, reminders, or notes about this bookmark..."
              ></textarea>
            </div>
            <div class="form-field">
              <label for="edit-tags">Tags (optional)</label>
              <input
                type="text"
                name="tags"
                id="edit-tags"
                placeholder="js, css, web development"
              />
              <p class="tags-hint">Separate tags with commas</p>
            </div>
            <input type="hidden" name="id" id="edit-id" />
            <div class="bookmark-actions">
              <button
                id="dialog-close"
                class="button solid critical"
                type="button"
              >
                Cancel
              </button>
              <button
                class="button solid"
                type="submit"
                id="save-changes-button"
              >
                <span class="button-text">Save Changes</span>
                <span class="button-loading" hidden>Saving...</span>
              </button>
            </div>
          </form>
        </dialog>
      </linkstack-edit-dialog>

      <linkstack-confirm-dialog>
        <dialog
          aria-labelledby="dialog-confirm-title"
          aria-describedby="dialog-confirm-message"
          class="linkstack-dialog"
          id="dialog-confirm-action"
        >
          <h3 id="dialog-confirm-title">Confirm action</h3>
          <p class="confirmation-dialog-message" id="dialog-confirm-message">
            Are you sure you want to continue?
          </p>
          <div class="bookmark-actions">
            <button
              id="confirm-dialog-cancel"
              class="button solid critical"
              type="button"
            >
              Cancel
            </button>
            <button
              id="confirm-dialog-confirm"
              class="button solid"
              type="button"
            >
              Confirm
            </button>
          </div>
        </dialog>
      </linkstack-confirm-dialog>
    </div>

    <!-- Toast notifications -->
    <linkstack-toast></linkstack-toast>

    <!-- Load main app coordinator -->
    <script type="module" src="src/app.js"></script>
    <script type="module" src="src/linkstack-confirm-dialog.js"></script>
    <script type="module" src="src/components/linkstack-toast.js"></script>
    <script type="module" src="src/components/view-toggle.js"></script>
  </body>
</html>
